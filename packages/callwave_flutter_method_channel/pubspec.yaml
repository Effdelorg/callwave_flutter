name: callwave_flutter_method_channel
description: MethodChannel implementation for callwave_flutter. Provides native Android (Kotlin) and iOS (Swift) integration for VoIP call notifications and CallKit/full-screen intent support.
version: 0.1.1
homepage: https://github.com/Effdelorg/callwave_flutter
repository: https://github.com/Effdelorg/callwave_flutter
issue_tracker: https://github.com/Effdelorg/callwave_flutter/issues
license: BSD-3-Clause
resolution: workspace

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  callwave_flutter_platform_interface: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    implements: callwave_flutter
    platforms:
      android:
        package: com.callwave.flutter.methodchannel
        pluginClass: CallwaveFlutterPlugin
        dartPluginClass: MethodChannelCallwaveFlutter
      ios:
        pluginClass: CallwaveFlutterPlugin
        dartPluginClass: MethodChannelCallwaveFlutter
