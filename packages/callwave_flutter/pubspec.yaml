name: callwave_flutter
description: Flutter plugin for WhatsApp-style VoIP call UX. Shows incoming/outgoing call notifications, accept/decline/timeout handling, and CallKit/Android full-screen intents. Use with your own signaling and media stack.
version: 0.1.1
homepage: https://github.com/Effdelorg/callwave_flutter
repository: https://github.com/Effdelorg/callwave_flutter
issue_tracker: https://github.com/Effdelorg/callwave_flutter/issues
license: BSD-3-Clause
resolution: workspace

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  callwave_flutter_platform_interface: ^0.1.0
  callwave_flutter_method_channel: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        default_package: callwave_flutter_method_channel
      ios:
        default_package: callwave_flutter_method_channel
