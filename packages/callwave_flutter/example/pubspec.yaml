name: callwave_flutter_example
description: Example app for callwave_flutter.
publish_to: 'none'
version: 0.1.0+1
resolution: workspace

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  callwave_flutter:
    path: ..
  camera: ^0.12.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  callwave_flutter_platform_interface:
    path: ../../callwave_flutter_platform_interface

flutter:
  uses-material-design: true
