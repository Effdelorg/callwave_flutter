name: callwave_flutter_example
description: Example app for callwave_flutter.
publish_to: 'none'
version: 0.1.0+1
resolution: workspace

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  callwave_flutter:
    path: ../packages/callwave_flutter
