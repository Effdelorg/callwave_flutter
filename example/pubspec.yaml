name: callwave_flutter_example
description: Example app for callwave_flutter.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  callwave_flutter:
    path: ../packages/callwave_flutter

dependency_overrides:
  callwave_flutter_platform_interface:
    path: ../packages/callwave_flutter_platform_interface
  callwave_flutter_method_channel:
    path: ../packages/callwave_flutter_method_channel

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
